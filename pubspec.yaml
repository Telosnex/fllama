name: fllama
description: "A new Flutter FFI plugin project."
version: 0.0.1
homepage:
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

environment:
  sdk: '>=3.10.0 <4.0.0'
  flutter: '>=3.38.0'

dependencies:
  ffi: ^2.1.0
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2
  jinja: ^0.6.2
  uuid: ^4.3.3
  objective_c: ^9.3.0
  # Native assets build hook dependencies
  hooks: any
  code_assets: any
  native_toolchain_cmake: ^0.2.4
  logging: any

dev_dependencies:
  ffigen: ^9.0.0
  flutter_lints: ^2.0.0
  test: ^1.24.9

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# Native code is built via hook/build.dart (native assets).
# No flutter: plugin: section needed — the hook replaces ffiPlugin.